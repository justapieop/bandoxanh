services:
  postgres:
    image: postgres:15-alpine
    container_name: bandoxanh-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secure_password_change_me
      POSTGRES_DB: bandoxanh
    ports:
      - "5433:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
